name: Release

on:
  push: 
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

env:
  CARGO_TERM_COLOR: always

jobs:
  ubuntu-build:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7
    - name: Install cap'n proto
      run: |
        curl -O https://capnproto.org/capnproto-c++-1.5.0.tar.gz
        tar zxf capnproto-c++-1.5.0.tar.gz
        cd capnproto-c++-1.5.0
        ./configure
        make -j4 check
        sudo make install
    - name: Build
      run: |
        rustup component add rust-src --toolchain nightly
        cargo +nightly rustc --release -Z build-std=std,panic_abort --no-default-features --features beacon,server,pqxdh --crate-type=staticlib
    - name: Run tests
      run: cargo test --verbose
    - name: Rename
      run: mv target/release/libbeaconcrypt.a target/release/libbeaconcrypt-${{ matrix.os }}.a
    - name: Upload release artifact
      uses: actions/upload-artifact@v7
      with:
        name: beaconcrypt-static-${{ matrix.os }}
        path: target/release/libbeaconcrypt-${{ matrix.os }}.a
        retention-days: 7

  windows-build:
    strategy:
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7
    - name: Install cap'n proto
      run: |
        curl.exe -O https://capnproto.org/capnproto-c++-win32-1.5.0.zip
        Expand-Archive capnproto-c++-win32-1.5.0.zip
    - name: Build
      run: |
        $env:Path = "$env:Path;$(join-path $pwd '\capnproto-c++-win32-1.5.0\capnproto-tools-win32-1.5.0')"
        rustup component add rust-src --toolchain nightly-msvc
        cargo +nightly rustc --release -Z build-std=std,panic_abort --no-default-features --features beacon,server,pqxdh --crate-type=staticlib
        ls target/release
    - name: Run tests
      run: |
        $env:Path = "$env:Path;$(join-path $pwd '\capnproto-c++-win32-1.5.0\capnproto-tools-win32-1.5.0')"
        cargo test --verbose
    - name: Rename
      run: mv target/release/beaconcrypt.lib target/release/beaconcrypt-${{ matrix.os }}.lib
    - name: Upload release artifact
      uses: actions/upload-artifact@v7
      with:
        name: beaconcrypt-static-${{ matrix.os }}
        path: target/release/beaconcrypt-${{ matrix.os }}.lib
        retention-days: 7

  windows-mingw-build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7
    - name: Set up MinGW
      uses: msys2/setup-msys2@v2
      with:
        install: mingw-w64-x86_64-gcc
    - name: Install cap'n proto
      run: |
        "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH
        curl.exe -O https://capnproto.org/capnproto-c++-win32-1.5.0.zip
        Expand-Archive capnproto-c++-win32-1.5.0.zip
        "$pwd\capnproto-c++-win32-1.5.0\capnproto-tools-win32-1.5.0" >> $env:GITHUB_PATH
    - name: Build
      env:
        CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc
      run: |
        rustup target add x86_64-pc-windows-gnu --toolchain nightly
        rustup component add rust-src --toolchain nightly
        cargo +nightly rustc --release -Z build-std=std,panic_abort --target x86_64-pc-windows-gnu --no-default-features --features beacon,server,pqxdh --crate-type=staticlib
        ls target/x86_64-pc-windows-gnu/release
    - name: Run tests
      env:
        CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc
      run: cargo test --verbose --target x86_64-pc-windows-gnu
    - name: Rename
      run: mv target/x86_64-pc-windows-gnu/release/libbeaconcrypt.a target/x86_64-pc-windows-gnu/release/libbeaconcrypt-windows-mingw-x86_64.a
    - name: Upload release artifact
      uses: actions/upload-artifact@v7
      with:
        name: beaconcrypt-static-windows-mingw-x86_64
        path: target/x86_64-pc-windows-gnu/release/libbeaconcrypt-windows-mingw-x86_64.a
        retention-days: 7

  release:
    needs: [ubuntu-build, windows-build, windows-mingw-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v7
    - name: Download release artifact
      uses: actions/download-artifact@v8
      with:
        path: ./dist
        merge-multiple: true
    - name: Publish built binary to GitHub releases
      run: |
        gh release create ${{ github.ref_name }} --notes-from-tag ./dist/*
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
